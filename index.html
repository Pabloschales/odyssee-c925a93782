<!doctype html>
<html lang="de">
<head>
<meta name="robots" content="noindex, nofollow, noarchive">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Reise-Atlas · Pablo · 2016–2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.geodesic@2.7.1/dist/leaflet.geodesic.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root{--bg:#0a0d12;--panel:rgba(14,18,26,.82);--line:rgba(255,255,255,.12);--text:#f2efe6;--dim:#aab2c0;--fade:#7e8696;
    --gold:#e3b261;--fly:#7fd1ff;--hotel:#e3b261;--ride:#6acf9b;--cal:#b794f6;--home:#ffd166;
    --drive:#ff9e64;--walk:#9ae6b4;--cycle:#b794f6;--rail:#f6788f;--other:#cbd5e0;
    --serif:"Fraunces",Georgia,serif;--sans:"Manrope",-apple-system,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
  #map{position:absolute;inset:0;background:#0a0d12;z-index:1}
  .leaflet-control-attribution{background:rgba(10,13,18,.6)!important;color:var(--fade)!important;font-size:9px!important}
  .leaflet-control-attribution a{color:var(--dim)!important}
  .brand{position:absolute;top:18px;left:18px;z-index:1000;pointer-events:none}
  .brand .eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .brand h1{font-family:var(--serif);font-weight:400;font-size:30px;line-height:1;letter-spacing:-.02em;margin-top:4px;text-shadow:0 2px 18px rgba(0,0,0,.7)}
  .brand h1 em{font-style:italic;color:var(--gold);font-weight:300}
  .brand .sub{font-family:var(--serif);font-style:italic;font-size:12px;color:var(--dim);margin-top:4px;text-shadow:0 1px 12px rgba(0,0,0,.8)}
  .topstats{position:absolute;top:18px;right:18px;z-index:1000;display:flex;gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:10px;overflow:hidden;backdrop-filter:blur(10px)}
  .topstats .s{background:var(--panel);padding:9px 14px;text-align:center;min-width:60px}
  .topstats .n{font-family:var(--serif);font-size:19px;font-weight:400;line-height:1}
  .topstats .l{font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--fade);margin-top:3px}
  .panel{position:absolute;left:18px;bottom:18px;z-index:1000;background:var(--panel);backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:14px;padding:14px;min-width:210px}
  .panel .ttl{font-family:var(--serif);font-style:italic;font-size:11px;color:var(--fade);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
  .toggle{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:9px;cursor:pointer;transition:background .15s}
  .toggle:hover{background:rgba(255,255,255,.05)}
  .toggle .dot{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
  .toggle .lbl{font-size:12px;font-weight:500;flex:1}
  .toggle .cnt{font-size:10px;color:var(--fade)}
  .toggle.off{opacity:.38}.toggle.off .dot{box-shadow:none;background:var(--fade)!important}
  .modekey{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:6px;padding-top:10px;border-top:1px solid var(--line)}
  .modekey span{font-size:9.5px;color:var(--dim);display:flex;align-items:center;gap:5px}
  .modekey i{width:14px;height:3px;border-radius:2px;display:inline-block}
  .yearbar{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:1000;display:flex;gap:4px;
    background:var(--panel);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:30px;padding:5px 7px;max-width:80vw;overflow-x:auto}
  .yearbar button{background:transparent;border:none;color:var(--dim);font-family:var(--sans);font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .yearbar button:hover{color:var(--text)}.yearbar button.on{background:var(--gold);color:#0a0d12}
  .actions{position:absolute;right:18px;bottom:18px;z-index:1000;display:flex;gap:8px}
  .actbtn{border:1px solid var(--line);font-family:var(--sans);font-weight:700;font-size:13px;padding:12px 18px;border-radius:30px;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.45);display:flex;align-items:center;gap:7px;background:var(--panel);color:var(--text);backdrop-filter:blur(10px)}
  .actbtn.prim{background:var(--gold);color:#0a0d12;border-color:var(--gold)}.actbtn:hover{filter:brightness(1.08)}
  .leaflet-popup-content-wrapper{background:#11151d;color:var(--text);border:1px solid var(--line);border-radius:10px}
  .leaflet-popup-tip{background:#11151d}
  .pop .k{font-size:9px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px}
  .pop .v{font-weight:600;font-size:14px}.pop .m{font-size:11px;color:var(--dim);margin-top:2px}
  .pop .popdel{margin-top:9px;background:rgba(246,120,143,.15);border:1px solid rgba(246,120,143,.4);color:#f6788f;font-family:var(--sans);font-weight:700;font-size:11px;padding:6px 11px;border-radius:8px;cursor:pointer;width:100%}
  .pop .popdel:hover{background:rgba(246,120,143,.32)}
  .recap-ui{position:fixed;inset:0;z-index:2600;pointer-events:none;display:none;flex-direction:column;justify-content:space-between;padding:max(5vh,34px) max(4vw,28px)}
  .recap-ui.on{display:flex}
  .recap-month{font-family:var(--sans);font-weight:600;font-size:clamp(15px,3vw,30px);text-transform:uppercase;letter-spacing:.18em;color:var(--gold);text-shadow:0 2px 16px rgba(0,0,0,.9);margin-bottom:2px;min-height:1em}
  .recap-year{font-family:var(--serif);font-weight:300;font-size:clamp(46px,11vw,118px);line-height:.9;color:#fff;text-shadow:0 4px 34px rgba(0,0,0,.85);letter-spacing:-.02em}
  .recap-cap{font-family:var(--serif);font-style:italic;font-size:clamp(13px,2.4vw,20px);color:var(--gold);text-shadow:0 2px 16px rgba(0,0,0,.9);margin-top:6px}
  .recap-counters{display:flex;flex-wrap:wrap;gap:clamp(14px,3.5vw,38px) clamp(16px,4vw,40px);align-items:flex-end;max-width:88vw}
  .recap-counters .rc-n{font-family:var(--serif);font-weight:400;font-size:clamp(26px,6vw,52px);line-height:1;color:var(--gold);text-shadow:0 3px 20px rgba(0,0,0,.85)}
  .recap-counters .rc-l{font-size:clamp(9px,1.5vw,12px);text-transform:uppercase;letter-spacing:.12em;color:#e9ecf2;margin-top:5px;text-shadow:0 1px 10px rgba(0,0,0,.9)}
  .recap-stop{position:absolute;top:24px;right:24px;pointer-events:auto;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);color:#fff;border:1px solid var(--line);font-family:var(--sans);font-weight:600;font-size:13px;padding:9px 15px;border-radius:24px;cursor:pointer}
  .recap-vignette{position:fixed;inset:0;z-index:2550;pointer-events:none;display:none;box-shadow:inset 0 0 180px 40px rgba(5,7,10,.7)}
  .recap-vignette.on{display:block}
  .poster{position:fixed;inset:0;z-index:3000;background:rgba(5,7,10,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
  .poster.open{display:flex}
  .stage{position:relative;overflow:hidden;border-radius:18px;box-shadow:0 20px 70px rgba(0,0,0,.6);background:#0a0d12;width:min(86vw,540px)}
  .stage.r11{aspect-ratio:1/1}.stage.r45{aspect-ratio:4/5}.stage.r916{aspect-ratio:9/16}.stage.r916{width:min(56vw,360px)}
  .stage #map{position:absolute;inset:0}
  .pmask-top,.pmask-bot{position:absolute;left:0;right:0;z-index:1200;pointer-events:none}
  .pmask-top{top:0;padding:22px 22px 40px;background:linear-gradient(180deg,rgba(7,9,13,.92),rgba(7,9,13,0))}
  .pmask-bot{bottom:0;padding:40px 22px 22px;background:linear-gradient(0deg,rgba(7,9,13,.94),rgba(7,9,13,0))}
  .pmask-top .pe{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .pmask-top .ph{font-family:var(--serif);font-size:30px;line-height:1;margin-top:5px}.pmask-top .ph em{font-style:italic;color:var(--gold);font-weight:300}
  .pgrid{position:absolute;left:22px;right:22px;bottom:60px;z-index:1200;display:flex;gap:18px;pointer-events:none}
  .pgrid .pn{font-family:var(--serif);font-size:26px;line-height:1;color:#fff}.pgrid .pl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-top:3px}
  .pmask-bot .cap{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--dim)}
  .pctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
  .pctrl button{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--text);font-family:var(--sans);font-weight:600;font-size:12px;padding:9px 14px;border-radius:24px;cursor:pointer}
  .pctrl button.on{background:var(--gold);color:#0a0d12;border-color:var(--gold)}.pctrl .prim{background:var(--gold);color:#0a0d12;border-color:var(--gold)}
  .pctrl .hint{font-size:10px;color:var(--fade);width:100%;text-align:center;margin-top:2px}
  @media(max-width:680px){.brand h1{font-size:23px}.topstats .s{padding:7px 9px;min-width:50px}.topstats .n{font-size:15px}.panel{min-width:0;left:12px;right:12px;bottom:74px}}
</style>
</head>
<body>
<div id="map"></div>
<div class="brand">
  <div class="eyebrow">Pablo · Reise-Atlas</div>
  <h1></h1>
  <div class="sub">2016 – 2026 · nur belegte Daten</div>
</div>
<div class="topstats" id="topstats"></div>
<div class="panel">
  <div class="ttl">Ebenen</div>
  <div class="toggle" data-layer="flights"><span class="dot" style="color:var(--fly);background:var(--fly)"></span><span class="lbl">Strecken (Flug/Auto/Bahn)</span><span class="cnt" id="c-flights"></span></div>
  <div class="toggle" data-layer="presence"><span class="dot" style="color:var(--ride);background:var(--ride)"></span><span class="lbl">Aufenthalte</span><span class="cnt" id="c-presence"></span></div>
  <div class="toggle" data-layer="photos"><span class="dot" style="color:#ffd166;background:#ffd166"></span><span class="lbl">Fotos</span><span class="cnt" id="c-photos"></span></div>
  <div class="toggle" data-layer="tracks"><span class="dot" style="color:var(--drive);background:var(--drive)"></span><span class="lbl">Echte Wege</span><span class="cnt" id="c-tracks"></span></div>
  <div class="toggle" data-layer="home"><span class="dot" style="color:var(--home);background:var(--home)"></span><span class="lbl">Zuhause</span><span class="cnt" id="c-home"></span></div>
  <div class="modekey">
    <span><i style="background:var(--hotel)"></i>Unterkunft</span><span><i style="background:var(--ride)"></i>Fahrt</span>
    <span><i style="background:var(--cal)"></i>Termin</span><span><i style="background:var(--rail)"></i>Bahn-Track</span>
  </div>
</div>
<div class="yearbar" id="yearbar"></div>
<div class="actions">
  <button class="actbtn" id="recapbtn">▶ Recap</button>
  <button class="actbtn prim" id="posterbtn">📷 Poster</button>
</div>
<div class="recap-vignette" id="recapvig"></div>
<div class="recap-ui" id="recapui">
  <div><div class="recap-month" id="r-month"></div><div class="recap-year" id="r-year"></div><div class="recap-cap" id="r-cap"></div></div>
  <div class="recap-counters" id="r-counters"></div>
  <button class="recap-stop" id="r-stop">⏹ Stop</button>
</div>
<div class="poster" id="poster">
  <div class="stage r45" id="stage">
    <div class="pmask-top"><div class="pe">Pablo · Reise-Atlas</div><div class="ph"></div></div>
    <div class="pgrid" id="pgrid"></div>
    <div class="pmask-bot"><div class="cap" id="pcap"></div></div>
  </div>
  <div class="pctrl">
    <button data-fmt="r11">1:1</button><button data-fmt="r45" class="on">4:5</button><button data-fmt="r916">9:16 Story</button>
    <button class="prim" id="savebtn">⬇︎ Als Bild speichern</button><button id="closeposter">Schließen</button>
    <div class="hint">Tipp: Wenn der Download streikt, einfach Screenshot machen.</div>
  </div>
</div>

<script>
const D=JSON.parse(document.getElementById('DATA').textContent), S=D.stats;
const MODECOL={drive:'#ff9e64',walk:'#9ae6b4',cycle:'#b794f6',rail:'#f6788f',fly:'#7fd1ff',other:'#cbd5e0'};
const KINDCOL={hotel:'#e3b261',ride:'#6acf9b',calendar:'#b794f6',manual:'#ffd166'};
const KINDLBL={hotel:'Unterkunft',ride:'Fahrt',calendar:'Termin',manual:'Ort'};
const ROUTECOL={flight:'#7fd1ff',car:'#ff9e64',train:'#f6788f',ride:'#6acf9b'};
const ROUTELBL={flight:'✈ Flug',car:'🚗 Auto',train:'🚆 Bahn',ride:'🚕 Taxi'};
const BUILD=S.build||'';
function deDate(s){const m=(s||'').match(/^(\d{4})-(\d{2})-(\d{2})/);return m?m[3]+'.'+m[2]+'.'+m[1]:(s||'');}
function toCompact(f){return {a:[f.from_lat,f.from_lon],b:[f.to_lat,f.to_lon],fn:f.from_name,tn:f.to_name,tc:f.to_country||'',d:f.date,y:f.year,km:f.distance_km,e:/vermutlich|geschätzt|gesch\.|approx/i.test(f.note||'')?1:0,n:f.note||'',m:f.mode||'flight'};}
const _gk=f=>Math.round(f.a[0]*1e4)+','+Math.round(f.a[1]*1e4)+';'+Math.round(f.b[0]*1e4)+','+Math.round(f.b[1]*1e4);
const _geomByKey={};D.flights.forEach(f=>{if(f.geom&&f.geom.length>1)_geomByKey[_gk(f)]=f.geom;});  // Straßen-Geometrie aus Embed sichern
try{if(localStorage.getItem('odyssee_build')===BUILD){
  const lf=localStorage.getItem('odyssee_flights_v2');if(lf){D.flightsFull=JSON.parse(lf);D.flights=D.flightsFull.map(toCompact);D.flights.forEach(f=>{const g=_geomByKey[_gk(f)];if(g)f.geom=g;});}  // Geometrie wieder anhängen
  const lp=localStorage.getItem('odyssee_presence_v2');if(lp)D.presence=JSON.parse(lp);}}catch(e){}
function saveEdits(){try{localStorage.setItem('odyssee_flights_v2',JSON.stringify(D.flightsFull||[]));localStorage.setItem('odyssee_presence_v2',JSON.stringify(D.presence));localStorage.setItem('odyssee_build',BUILD);}catch(e){}}
const map=L.map('map',{zoomControl:false,attributionControl:true,worldCopyJump:true,preferCanvas:true}).setView([0,0],3);
const satTiles=L.tileLayer('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=',{maxZoom:18,crossOrigin:true,attribution:'Imagery © Esri',updateWhenZooming:false,keepBuffer:4}).addTo(map);

const layers={flights:L.layerGroup(),presence:L.layerGroup(),photos:L.layerGroup(),tracks:L.layerGroup(),home:L.layerGroup()};
let activeYear='all';
const inYear=y=>activeYear==='all'||y===activeYear;
const pYear=p=>parseInt((p.t||'').slice(0,4))||0;

function drawFlights(){layers.flights.clearLayers();D.flights.forEach((f,i)=>{if(!inYear(f.y))return;
  const mode=f.m||'flight';const col=f.e?'#9bbdd6':(ROUTECOL[mode]||'#7fd1ff');
  const ln=(f.geom&&f.geom.length>1)
    ? L.polyline(f.geom,{weight:mode==='ride'?2:2.4,color:col,opacity:.8})
    : (mode==='flight')
      ? new L.Geodesic([[f.a[0],f.a[1]],[f.b[0],f.b[1]]],{weight:f.e?1.4:1.9,color:col,opacity:f.e?.55:.82,steps:48,dashArray:f.e?'4 5':null})
      : L.polyline([[f.a[0],f.a[1]],[f.b[0],f.b[1]]],{weight:mode==='ride'?2:2.6,color:col,opacity:mode==='ride'?.7:.82,dashArray:f.e?'4 5':null});
  ln.bindPopup(`<div class="pop"><div class="k" style="color:${col}">${ROUTELBL[mode]||'Flug'} · ${f.d}${f.e?' · geschätzt':''}</div><div class="v">${f.fn} → ${f.tn}</div><div class="m">${f.km.toLocaleString('de')} km${f.n?' · '+f.n:''}</div><button class="popdel" data-arr="f" data-i="${i}">🗑 löschen</button></div>`);
  ln.addTo(layers.flights);});}
function drawPresence(){layers.presence.clearLayers();D.presence.forEach((p,i)=>{if(!inYear(pYear(p)))return;
  const c=KINDCOL[p.kind]||'#cbd5e0';
  L.circleMarker([p.lat,p.lon],{radius:4.6,color:'#fff',weight:.6,opacity:.9,fillColor:c,fillOpacity:.82})
   .bindPopup(`<div class="pop"><div class="k" style="color:${c}">${KINDLBL[p.kind]||p.kind} · ${deDate(p.t)}</div><div class="v">${p.name||p.place||'—'}</div><div class="m">${p.addr?p.addr+' · ':''}${p.place||''} ${p.country||''}</div><button class="popdel" data-arr="p" data-i="${i}">🗑 löschen</button></div>`).addTo(layers.presence);});}
function drawTracks(){layers.tracks.clearLayers();D.tracks.forEach(t=>{if(!inYear(t.y))return;const cls=t.m!=='other';
  L.polyline(t.pts,{color:MODECOL[t.m]||MODECOL.other,weight:cls?3:1.6,opacity:cls?.88:.45,lineJoin:'round',lineCap:'round'}).addTo(layers.tracks);});}
function drawHome(){layers.home.clearLayers();D.visits.forEach(v=>{const c=v.t==='Home'?'#ffd166':'#7fd1ff';
  L.marker([v.lat,v.lon],{icon:L.divIcon({className:'',iconSize:[16,16],iconAnchor:[8,8],html:`<div style="width:13px;height:13px;border-radius:50%;background:${c};border:2px solid #0a0d12;box-shadow:0 0 0 2px ${c}88"></div>`})})
   .bindPopup(`<div class="pop"><div class="k" style="color:#ffd166">Ort</div><div class="v">${v.t==='Home'?'Zuhause':'Arbeit'}</div></div>`).addTo(layers.home);});}
function drawPhotos(){layers.photos.clearLayers();(D.photos||[]).forEach(p=>{if(!inYear(p.y))return;
  L.circleMarker([p.lat,p.lon],{radius:p.f?4:2.6,color:'#fff',weight:p.f?1:.4,opacity:p.f?.9:.6,fillColor:'#ffd166',fillOpacity:p.f?.95:.6})
   .bindPopup(`<div class="pop"><div class="k" style="color:#ffd166">Foto · ${p.y}${p.f?' · ★':''}</div><div class="v">${p.place||'—'}</div><div class="m">${p.country||''}</div></div>`).addTo(layers.photos);});}
function redraw(){drawFlights();drawPresence();drawPhotos();drawTracks();}
drawFlights();drawPresence();drawPhotos();drawTracks();drawHome();
Object.values(layers).forEach(l=>l.addTo(map));
const allPts=D.presence.map(p=>[p.lat,p.lon]).concat((D.photos||[]).map(p=>[p.lat,p.lon])).concat(D.flights.flatMap(f=>[f.a,f.b]));
if(allPts.length)map.fitBounds(allPts,{padding:[60,60]});

document.addEventListener('click',e=>{const b=e.target.closest('.popdel');if(!b)return;
  const arr=b.dataset.arr,i=+b.dataset.i;
  if(arr==='f'){if(D.flightsFull)D.flightsFull.splice(i,1);D.flights.splice(i,1);}else{D.presence.splice(i,1);}
  saveEdits();map.closePopup();redraw();
  const cf=document.getElementById('c-flights');if(cf)cf.textContent=D.flights.length;
  const cp=document.getElementById('c-presence');if(cp)cp.textContent=D.presence.length;});
document.querySelectorAll('.toggle').forEach(t=>t.addEventListener('click',()=>{const k=t.dataset.layer;
  if(map.hasLayer(layers[k])){map.removeLayer(layers[k]);t.classList.add('off');}else{layers[k].addTo(map);t.classList.remove('off');}}));

let statDefs=[['countries','Länder'],['flights','Flüge'],['flight_km','km geflogen'],['presence','Aufenthalte']];
document.getElementById('topstats').innerHTML=statDefs.map(([k,l])=>`<div class="s"><div class="n">${(S[k]||0).toLocaleString('de')}</div><div class="l">${l}</div></div>`).join('');
document.getElementById('c-flights').textContent=D.flights.length;
document.getElementById('c-presence').textContent=S.presence;
document.getElementById('c-photos').textContent=(D.photos||[]).length;
document.getElementById('c-tracks').textContent=D.tracks.length;
document.getElementById('c-home').textContent=D.visits.length;

const yb=document.getElementById('yearbar');const years=['all'];for(let y=S.year_min;y<=S.year_max;y++)years.push(y);
yb.innerHTML=years.map(y=>`<button data-y="${y}" class="${y==='all'?'on':''}">${y==='all'?'Alle':y}</button>`).join('');
yb.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{yb.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');activeYear=b.dataset.y==='all'?'all':parseInt(b.dataset.y);redraw();}));

// Poster
const poster=document.getElementById('poster'),stage=document.getElementById('stage'),mapEl=document.getElementById('map');
const mapHome=mapEl.parentNode;
document.getElementById('pgrid').innerHTML=[[S.countries,'Länder'],[S.flights,'Flüge'],[S.flight_km.toLocaleString('de'),'km in der Luft']].map(([n,l])=>`<div><div class="pn">${n}</div><div class="pl">${l}</div></div>`).join('');
document.getElementById('pcap').textContent=`${S.year_min} – ${S.year_max} · ${S.presence} belegte Aufenthalte`;
document.getElementById('posterbtn').addEventListener('click',()=>{poster.classList.add('open');stage.insertBefore(mapEl,stage.firstChild);setTimeout(()=>map.invalidateSize(),60);});
function closePoster(){poster.classList.remove('open');mapHome.appendChild(mapEl);setTimeout(()=>map.invalidateSize(),60);}
document.getElementById('closeposter').addEventListener('click',closePoster);
document.querySelectorAll('.pctrl [data-fmt]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.pctrl [data-fmt]').forEach(x=>x.classList.remove('on'));b.classList.add('on');stage.className='stage '+b.dataset.fmt;setTimeout(()=>map.invalidateSize(),60);}));
document.getElementById('savebtn').addEventListener('click',()=>{const btn=document.getElementById('savebtn');
  if(typeof html2canvas!=='function'){btn.textContent='Bitte Screenshot machen ↗';return;}btn.textContent='… rendert';
  html2canvas(stage,{useCORS:true,backgroundColor:'#0a0d12',scale:2}).then(cv=>{const a=document.createElement('a');a.download='reise-atlas.png';a.href=cv.toDataURL('image/png');a.click();btn.textContent='⬇︎ Als Bild speichern';}).catch(()=>{btn.textContent='Screenshot nutzen ↗';});});

// Recap
const recapUI=document.getElementById('recapui'),recapVig=document.getElementById('recapvig');
const rYear=document.getElementById('r-year'),rCap=document.getElementById('r-cap'),rCnt=document.getElementById('r-counters'),rMonth=document.getElementById('r-month');
const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
let rcLands=new Set(),rcKm=0,rcCnt={flight:0,ride:0,car:0,train:0,stay:0};
const recapLayer=L.layerGroup();let recapOn=false,recapDot=null;
// wartet, bis die Satellitenkacheln des Ausschnitts geladen sind (oder Timeout) → Licht bewegt sich erst auf fertiger Karte = flüssig.
// lädt gerade nichts (Cache) → nur kurzer Settle, damit über viele Szenen keine Totzeit entsteht.
function waitTiles(maxMs){return new Promise(res=>{let done=false;const fin=()=>{if(done)return;done=true;satTiles.off('load',fin);res();};
  if(!satTiles._loading){setTimeout(fin,250);return;}
  satTiles.on('load',fin);setTimeout(fin,maxMs);});}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function showChrome(v){document.querySelectorAll('.brand,.topstats,.panel,.yearbar,.actions').forEach(e=>{e.style.transition='opacity .5s';e.style.opacity=v?'':'0';e.style.pointerEvents=v?'':'none';});}
function planeIcon(){return L.divIcon({className:'',iconSize:[18,18],iconAnchor:[9,9],html:'<div style="width:11px;height:11px;border-radius:50%;background:#fff;box-shadow:0 0 14px 5px #7fd1ff,0 0 5px 2px #fff"></div>'});}
function setCounters(){const it=[['Länder',rcLands.size],['km',Math.round(rcKm).toLocaleString('de')],['Flüge',rcCnt.flight],['Taxi',rcCnt.ride],['Auto',rcCnt.car],['Bahn',rcCnt.train],['Unterkünfte',rcCnt.stay]];
  rCnt.innerHTML=it.map(([l,n])=>`<div><div class="rc-n">${n}</div><div class="rc-l">${l}</div></div>`).join('');}
function setDate(d){if(!d)return;const m=parseInt(d.slice(3,5),10);rMonth.textContent=MONTHS[m-1]||'';rYear.textContent=d.slice(6,10);}  // leeres Datum (Platzhalter) → Anzeige unverändert lassen
function moveDot(ll,dur){return new Promise(res=>{
  if(!ll||!ll.length){res();return;}
  ll=ll.map(p=>(p&&p.lat!==undefined)?p:L.latLng(p));      // alles zu echten LatLng zwingen
  if(!recapDot)recapDot=L.marker(ll[0],{icon:planeIcon(),interactive:false}).addTo(recapLayer);
  if(ll.length===1){recapDot.setLatLng(ll[0]);res();return;}
  if(!(dur>0))dur=600;
  const n=ll.length-1,t0=performance.now();let done=false;const fin=()=>{if(!done){done=true;res();}};
  const safety=setTimeout(fin,dur+500);                    // Sicherheitsnetz: löst immer aus → kein Hänger
  (function step(now){if(done)return;if(!recapOn){clearTimeout(safety);fin();return;}
    try{const t=Math.min(1,(now-t0)/dur),x=t*n,i=Math.min(n-1,Math.floor(x)),fr=x-i,A=ll[i],B=ll[i+1];
      recapDot.setLatLng([A.lat+(B.lat-A.lat)*fr,A.lng+(B.lng-A.lng)*fr]);  // zwischen Stützpunkten interpolieren
      if(t<1)requestAnimationFrame(step);else{clearTimeout(safety);fin();}
    }catch(e){clearTimeout(safety);fin();}})(t0);});}
const SPEED=0.7; // <1 = langsamer, >1 = schneller
const JUMPKM=20; // ab dieser Distanz (km) zwischen zwei Segmenten = sichtbarer „Sprung" → gestrichelte Verbinder-Linie
function geomOf(f){
  if(f.geom&&f.geom.length>1)return f.geom.map(p=>L.latLng(p[0],p[1]));
  if((f.m||'flight')==='flight'){const a=new L.Geodesic([f.a,f.b],{steps:64});let g=a.getLatLngs();return Array.isArray(g[0])?g[0]:g;}
  return [L.latLng(f.a[0],f.a[1]),L.latLng(f.b[0],f.b[1])];}
function isLocal(f){return (f.m==='ride'||f.m==='car')&&(f.km||0)<60;}
function drawSeg(f,col){
  if(f.geom&&f.geom.length>1)L.polyline(f.geom,{weight:f.m==='ride'?2.2:2.6,color:col,opacity:.75}).addTo(recapLayer);
  else if((f.m||'flight')==='flight')new L.Geodesic([f.a,f.b],{weight:1.8,color:col,opacity:.7,steps:64}).addTo(recapLayer);
  else L.polyline([f.a,f.b],{weight:2.4,color:col,opacity:.7}).addTo(recapLayer);}
async function recapPlay(){if(recapOn)return;recapOn=true;showChrome(false);recapUI.classList.add('on');recapVig.classList.add('on');
  Object.values(layers).forEach(l=>map.removeLayer(l));recapLayer.clearLayers();recapDot=null;recapLayer.addTo(map);
  rYear.style.fontSize='';rCap.textContent='';rYear.textContent='';rMonth.textContent='';
  rcLands=new Set(['DE']);rcKm=0;rcCnt={flight:0,ride:0,car:0,train:0,stay:0};setCounters();
  // Tagesschlüssel = date_iso (di); Platzhalter ohne Anzeige-Datum sortieren über di trotzdem korrekt
  const dk=f=>f.di||(f.d?(f.d.slice(6,10)+'-'+f.d.slice(3,5)+'-'+f.d.slice(0,2)):'');
  const raw=D.flights.filter(f=>f.a&&f.b&&!(f.a[0]===0&&f.a[1]===0)).slice().sort((x,y)=>dk(x).localeCompare(dk(y)));
  // pro Tag fehlt die Uhrzeit → Segmente eines Tages räumlich verketten (nearest-neighbor), damit z.B. der Flug zwischen den zwei Uber-Fahrten landet (kein Teleport)
  const byDay={};for(const f of raw){(byDay[dk(f)]=byDay[dk(f)]||[]).push(f);}
  const pdist=(p,q)=>(p[0]-q[0])*(p[0]-q[0])+(p[1]-q[1])*(p[1]-q[1]);
  const segs=[];let last=null;
  for(const d of Object.keys(byDay).sort()){const pool=byDay[d].slice();
    if(pool.every(f=>f.tm)){pool.sort((a,b)=>a.tm.localeCompare(b.tm));for(const f of pool){segs.push(f);last=f.b;}}  // Tag voll mit Uhrzeit → exakte Reihenfolge
    else{while(pool.length){let bi=0,bd=Infinity;for(let i=0;i<pool.length;i++){const s=last?pdist(last,pool[i].a):0;if(s<bd){bd=s;bi=i;}}
      const f=pool.splice(bi,1)[0];segs.push(f);last=f.b;}}}
  const scenes=[];let cur=null;
  for(const f of segs){const loc=isLocal(f);if(loc&&cur&&cur.loc)cur.segs.push(f);else{cur={loc,segs:[f]};scenes.push(cur);}}
  let shownYear=S.year_min-1;
  map.flyTo([34,2],3.0,{duration:1.6/SPEED});await sleep(1700/SPEED);
  for(const sc of scenes){if(!recapOn)break;
   try{
    const yr=sc.segs[0].y;setDate(sc.segs[0].d);
    while(shownYear<yr){shownYear++;
      (D.photos||[]).filter(p=>p.y===shownYear).forEach(p=>{if(p.country)rcLands.add(p.country);L.circleMarker([p.lat,p.lon],{radius:p.f?3.6:2.2,color:'#fff',weight:.3,opacity:.6,fillColor:'#ffd166',fillOpacity:.55,interactive:false}).addTo(recapLayer);});
      D.presence.filter(p=>pYear(p)===shownYear).forEach(p=>{if(p.country)rcLands.add(p.country);if(p.kind==='hotel')rcCnt.stay++;L.circleMarker([p.lat,p.lon],{radius:3.6,color:'#fff',weight:.4,opacity:.7,fillColor:KINDCOL[p.kind]||'#cbd5e0',fillOpacity:.7,interactive:false}).addTo(recapLayer);});}
    setCounters();
    const allpts=sc.segs.flatMap(geomOf);
    // Stadt-Szene weit reinzoomen, mittlere Fahrten (Auto/Bahn) mittel, lange Flüge passt fitBounds selbst
    // sofortiger Schnitt (kein animiertes Zoomen während Kacheln laden) + warten bis Karte fertig → kein Ruckeln bei der Lichtbewegung
    if(allpts.length){try{map.fitBounds(L.latLngBounds(allpts),{padding:[70,70],maxZoom:sc.loc?14:9,animate:false});}catch(e){}}
    await waitTiles(1100/SPEED);if(!recapOn)break;
    for(const f of sc.segs){if(!recapOn)break;
     try{
      const col=ROUTECOL[f.m||'flight']||'#7fd1ff';const g=geomOf(f);if(!g.length)continue;
      drawSeg(f,col);
      if(recapDot){const c0=recapDot.getLatLng(),d0=map.distance(c0,g[0]);if(d0>80){
        if(d0>JUMPKM*1000)L.polyline([c0,g[0]],{weight:1.2,color:'#fff',opacity:.32,dashArray:'2 7',interactive:false}).addTo(recapLayer);  // Sprung sichtbar markieren
        await moveDot([c0,g[0]],Math.max(400,Math.min(1250,300+d0/2100))/SPEED);if(!recapOn)break;}}
      rcKm+=(f.km||0);if(f.tc)rcLands.add(f.tc);const mk=f.m||'flight';rcCnt[mk]=(rcCnt[mk]||0)+1;setDate(f.d);setCounters();
      const isF=(f.m||'flight')==='flight';const dur=isF?(800+(f.km||0)/12):(480+(f.km||0)*2.4);
      await moveDot(g,(isF?Math.max(650,Math.min(2900,dur)):Math.max(900,Math.min(2500,dur)))/SPEED);  // Stadtfahrt sichtbar lang
     }catch(e){console.warn('Recap-Segment übersprungen:',e);}}
    await sleep(120/SPEED);
   }catch(e){console.warn('Recap-Szene übersprungen:',e);}}
  if(recapOn){rCap.textContent='';map.flyTo([30,2],2.4,{duration:2.2/SPEED});await sleep(2200/SPEED);if(!recapOn)return;
    rMonth.textContent='';rYear.style.fontSize='clamp(38px,8.5vw,86px)';rYear.textContent=(S.year_max-S.year_min+1)+' Jahre';
    rCap.textContent='';setCounters();}}
function recapStop(){if(!recapOn&&!recapUI.classList.contains('on'))return;recapOn=false;
  recapUI.classList.remove('on');recapVig.classList.remove('on');recapLayer.clearLayers();recapDot=null;map.removeLayer(recapLayer);rYear.style.fontSize='';
  document.querySelectorAll('.toggle').forEach(t=>{if(!t.classList.contains('off'))layers[t.dataset.layer].addTo(map);});redraw();showChrome(true);}
document.getElementById('recapbtn').addEventListener('click',recapPlay);
document.getElementById('r-stop').addEventListener('click',recapStop);
document.addEventListener('keydown',e=>{if(e.key==='Escape')recapStop();});
</script>
</body>
</html>
